<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open in WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --green-light: #dcfce7;
      --bg: #f0fdf4;
      --card: #ffffff;
      --text: #0f2218;
      --muted: #4b7a5e;
      --border: #bbf7d0;
      --shadow: 0 20px 60px rgba(18, 140, 126, 0.15);
      --radius: 18px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: 24px;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(37,211,102,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(18,140,126,0.10) 0%, transparent 60%);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 44px 44px;
      width: 100%;
      max-width: 460px;
      border: 1.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--green), var(--green-dark));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(37,211,102,0.35);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 26px; height: 26px; fill: white; }

    .logo-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }

    .logo-text p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .phone-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .country-select-wrap {
      position: relative;
      flex: 0 0 130px;
    }

    select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--green-light);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 36px 14px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      height: 52px;
    }

    select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(37,211,102,0.18);
    }

    .country-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.8rem;
    }

    input[type="tel"] {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      height: 52px;
    }

    input[type="tel"]::placeholder { color: #a3c4af; }

    input[type="tel"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(37,211,102,0.18);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(37,211,102,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.02em;
      margin-top: 4px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(37,211,102,0.45);
    }

    .btn:active { transform: translateY(0); }

    .btn svg { width: 20px; height: 20px; fill: white; }

    .error {
      display: none;
      background: #fff1f1;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
    }

    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 18px;
    }

    .hint span { color: var(--green-dark); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <!-- WhatsApp icon -->
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2C8.268 2 2 8.268 2 16c0 2.49.648 4.83 1.782 6.857L2 30l7.347-1.926A13.93 13.93 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.4a11.34 11.34 0 0 1-5.795-1.587l-.415-.246-4.357 1.142 1.163-4.249-.27-.435A11.36 11.36 0 0 1 4.6 16C4.6 9.703 9.703 4.6 16 4.6c6.297 0 11.4 5.103 11.4 11.4 0 6.297-5.103 11.4-11.4 11.4zm6.258-8.54c-.343-.171-2.03-1.001-2.344-1.116-.315-.114-.545-.171-.774.171-.23.343-.887 1.116-1.087 1.345-.2.228-.4.257-.742.086-.343-.172-1.447-.533-2.756-1.7-1.019-.909-1.706-2.031-1.907-2.374-.2-.343-.021-.528.15-.699.155-.155.343-.4.515-.6.172-.2.229-.343.343-.572.115-.229.057-.429-.028-.6-.086-.172-.775-1.868-1.061-2.558-.28-.672-.564-.58-.775-.59l-.657-.012c-.229 0-.6.086-.915.429-.314.343-1.2 1.173-1.2 2.86s1.229 3.317 1.4 3.546c.172.228 2.42 3.696 5.863 5.185.82.354 1.46.566 1.958.724.823.261 1.572.225 2.163.137.66-.099 2.03-.83 2.315-1.633.286-.8.286-1.487.2-1.63-.085-.143-.314-.229-.657-.4z"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>WhatsApp Link</h1>
        <p>Open any number in WhatsApp</p>
      </div>
    </div>

    <label for="country">Country Code</label>
    <div class="phone-row">
      <div class="country-select-wrap">
        <select id="country">
          <option value="91">🇮🇳 +91</option>
          <option value="1">🇺🇸 +1</option>
          <option value="44">🇬🇧 +44</option>
          <option value="61">🇦🇺 +61</option>
          <option value="49">🇩🇪 +49</option>
          <option value="33">🇫🇷 +33</option>
          <option value="81">🇯🇵 +81</option>
          <option value="86">🇨🇳 +86</option>
          <option value="82">🇰🇷 +82</option>
          <option value="971">🇦🇪 +971</option>
          <option value="966">🇸🇦 +966</option>
          <option value="92">🇵🇰 +92</option>
          <option value="880">🇧🇩 +880</option>
          <option value="94">🇱🇰 +94</option>
          <option value="977">🇳🇵 +977</option>
          <option value="60">🇲🇾 +60</option>
          <option value="65">🇸🇬 +65</option>
          <option value="62">🇮🇩 +62</option>
          <option value="63">🇵🇭 +63</option>
          <option value="66">🇹🇭 +66</option>
          <option value="55">🇧🇷 +55</option>
          <option value="52">🇲🇽 +52</option>
          <option value="27">🇿🇦 +27</option>
          <option value="234">🇳🇬 +234</option>
          <option value="20">🇪🇬 +20</option>
          <option value="90">🇹🇷 +90</option>
          <option value="98">🇮🇷 +98</option>
          <option value="7">🇷🇺 +7</option>
          <option value="39">🇮🇹 +39</option>
          <option value="34">🇪🇸 +34</option>
        </select>
      </div>
      <input type="tel" id="phone" placeholder="Enter mobile number" inputmode="numeric" maxlength="15" />
    </div>

    <button class="btn" onclick="openWhatsApp()">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.49.648 4.83 1.782 6.857L2 30l7.347-1.926A13.93 13.93 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.4a11.34 11.34 0 0 1-5.795-1.587l-.415-.246-4.357 1.142 1.163-4.249-.27-.435A11.36 11.36 0 0 1 4.6 16C4.6 9.703 9.703 4.6 16 4.6c6.297 0 11.4 5.103 11.4 11.4 0 6.297-5.103 11.4-11.4 11.4zm6.258-8.54c-.343-.171-2.03-1.001-2.344-1.116-.315-.114-.545-.171-.774.171-.23.343-.887 1.116-1.087 1.345-.2.228-.4.257-.742.086-.343-.172-1.447-.533-2.756-1.7-1.019-.909-1.706-2.031-1.907-2.374-.2-.343-.021-.528.15-.699.155-.155.343-.4.515-.6.172-.2.229-.343.343-.572.115-.229.057-.429-.028-.6-.086-.172-.775-1.868-1.061-2.558-.28-.672-.564-.58-.775-.59l-.657-.012c-.229 0-.6.086-.915.429-.314.343-1.2 1.173-1.2 2.86s1.229 3.317 1.4 3.546c.172.228 2.42 3.696 5.863 5.185.82.354 1.46.566 1.958.724.823.261 1.572.225 2.163.137.66-.099 2.03-.83 2.315-1.633.286-.8.286-1.487.2-1.63-.085-.143-.314-.229-.657-.4z"/>
      </svg>
      Open in WhatsApp
    </button>

    <div class="error" id="error">⚠️ Please enter a valid phone number.</div>

    <p class="hint">Entering <span>9876543210</span> with <span>+91</span> opens <span>wa.me/919876543210</span></p>
  </div>

  <script>
    function openWhatsApp() {
      const code = document.getElementById('country').value.trim();
      const phone = document.getElementById('phone').value.trim().replace(/\D/g, '');
      const err = document.getElementById('error');

      if (!phone || phone.length < 6) {
        err.style.display = 'block';
        return;
      }

      err.style.display = 'none';
      const fullNumber = code + phone;
      window.open('https://wa.me/' + fullNumber, '_blank');
    }

    // Allow pressing Enter key too
    document.getElementById('phone').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') openWhatsApp();
    });
  </script>
</body>
</html>
